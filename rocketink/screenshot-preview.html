<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RocketInk Theme Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            width: 1200px;
            height: 900px;
            overflow: hidden;
        }
        
        .preview-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00A9E0 0%, #0984E3 50%, #A29BFE 100%);
            position: relative;
        }
        
        .preview-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
        }
        
        .preview-content {
            position: relative;
            z-index: 1;
            padding: 80px 40px;
            text-align: center;
            color: white;
        }
        
        .logo-preview {
            background: white;
            padding: 30px 60px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .logo-text {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(90deg, #00A9E0 0%, #E3001B 50%, #FFCD00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .description {
            font-size: 26px;
            margin-bottom: 45px;
            opacity: 0.95;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 50px;
        }
        
        .btn {
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .btn-primary {
            background: white;
            color: #00A9E0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            backdrop-filter: blur(10px);
        }
        
        .features-preview {
            display: flex;
            gap: 25px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px 25px;
            flex: 1;
            text-align: center;
        }
        
        .feature-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .feature-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 15px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="preview-content">
            <div class="logo-preview">
                <div class="logo-text">Rocket Printing</div>
            </div>
            
            <h1 class="tagline">Your Complete Printing Partner</h1>
            <p class="description">Professional commercial, security, and digital printing services</p>
            
            <div class="cta-buttons">
                <div class="btn btn-primary">Get Started</div>
                <div class="btn btn-secondary">Learn More</div>
            </div>
            
            <div class="features-preview">
                <div class="feature-card">
                    <span class="feature-icon">🔒</span>
                    <div class="feature-title">Secure Printing</div>
                    <div class="feature-text">Licensed & Certified</div>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">🎨</span>
                    <div class="feature-title">Commercial</div>
                    <div class="feature-text">Full Color & B&W</div>
                </div>
                <div class="feature-card">
                    <span class="feature-icon">💻</span>
                    <div class="feature-title">Digital Design</div>
                    <div class="feature-text">Web & Graphics</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
